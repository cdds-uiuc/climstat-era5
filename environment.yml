name: iema
channels:
  - conda-forge
dependencies:
  - python>=3.13
  - ipykernel
  # ── Array / dataframe core ───────────────────────────────────────────
  - numpy>=2.2
  - pandas>=2.3
  - scipy>=1.16
  # ── Xarray / cloud data access ───────────────────────────────────────
  - xarray>=2025.9
  - dask>=2025.9
  - zarr>=3.1
  - netcdf4>=1.7
  - h5netcdf>=1.6
  # ── ERA5 remote access (Google Cloud) ────────────────────────────────
  - gcsfs>=2025.9
  # ── Geospatial ───────────────────────────────────────────────────────
  - geopandas>=1.1
  - rasterio>=1.4
  # ── Visualization ────────────────────────────────────────────────────
  - matplotlib>=3.10
  - cartopy>=0.25
  # ── Dashboard ───────────────────────────────────────────────────────
  - voila
  - ipywidgets>=8.0
  # ── Interactive dashboard (Panel / HoloViz) ────────────────────────
  - geoviews>=1.12
  - hvplot>=0.10
  - panel>=1.4
